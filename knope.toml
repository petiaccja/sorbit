[package]
versioned_files = [
    "Cargo.toml",
    { path = "Cargo.lock", dependency = "sorbit" },
    { path = "Cargo.lock", dependency = "sorbit_derive" },
    { path = "Cargo.lock", dependency = "sorbit_derive_impl" },
    { path = "Cargo.toml", dependency = "sorbit_derive" },
    { path = "Cargo.toml", dependency = "sorbit_derive_impl" },
]
changelog = "CHANGELOG.md"

[[workflows]]
name = "release"
help_text = "Prepare and create a new release (update changelog, bump version, create release)"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = 'git commit -m "chore: prepare releases"'

# [[workflows.steps]]
# type = "Command"
# command = "git push"

# [[workflows.steps]]
# type = "Release"

[[workflows]]
name = "document-change"
help_text = "Create a new change file to be included in the next release"

[[workflows.steps]]
type = "CreateChangeFile"

[github]
owner = "petiaccja"
repo = "sorbit"

[changes]
ignore_conventional_commits = true
